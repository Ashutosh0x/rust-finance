# cliff.toml — git-cliff changelog generator configuration
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to RustForge Terminal are documented here.\n
Format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/)
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}**BREAKING** {% endif %}\
  {{ commit.message | upper_first }} \
  ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/Ashutosh0x/rust-finance/commit/{{ commit.id }}))\
  {% if commit.github.pr_number %} ([#{{ commit.github.pr_number }}](https://github.com/Ashutosh0x/rust-finance/pull/{{ commit.github.pr_number }})){% endif %}
{% endfor %}
{% endfor %}\n
"""
footer = """
---
[Full commit history](https://github.com/Ashutosh0x/rust-finance/commits/main)
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "Features"      },
  { message = "^fix",      group = "Bug Fixes"     },
  { message = "^perf",     group = "Performance"   },
  { message = "^refactor", group = "Refactoring"   },
  { message = "^test",     group = "Testing"       },
  { message = "^docs",     group = "Documentation" },
  { message = "^chore",    group = "Maintenance"   },
  { message = "^ci",       group = "CI/CD"         },
  { message = "^security", group = "Security"      },
  { message = ".*",        group = "Other"         },
]
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"
